<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ghostbusters Virginia — Fundraising Progress</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: system-ui, sans-serif;
      max-width: 640px;
      margin: 3rem auto;
      padding: 0 1.5rem;
      background: #0d0d0d;
      color: #f0f0f0;
    }

    h1 { font-size: 1.6rem; margin-bottom: 0.25rem; }
    p.subtitle { color: #aaa; margin-bottom: 2rem; font-size: 0.9rem; }

    button {
      background: #e63946;
      color: #fff;
      border: none;
      padding: 0.7rem 1.6rem;
      font-size: 1rem;
      border-radius: 6px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:disabled { opacity: 0.5; cursor: default; }
    button:not(:disabled):hover { opacity: 0.85; }

    #status {
      margin-top: 1rem;
      min-height: 1.4em;
      font-size: 0.9rem;
    }
    #status.success { color: #57cc99; }
    #status.error   { color: #e63946; }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .stat-box {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 1.2rem 1rem;
      text-align: center;
    }
    .stat-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: #888; }
    .stat-value { font-size: 2rem; font-weight: 700; margin-top: 0.3rem; }

    .progress-section { margin-top: 1.5rem; }
    .progress-track {
      background: #333;
      border-radius: 999px;
      height: 18px;
      overflow: hidden;
    }
    .progress-fill {
      background: #57cc99;
      height: 100%;
      width: 0%;
      border-radius: 999px;
      transition: width 0.6s ease;
    }
    .progress-label {
      font-size: 0.85rem;
      color: #aaa;
      margin-top: 0.4rem;
      text-align: right;
    }

    details {
      margin-top: 2rem;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 0.75rem 1rem;
    }
    summary { cursor: pointer; font-size: 0.85rem; color: #aaa; }
    pre#raw-response {
      margin: 0.75rem 0 0;
      overflow-x: auto;
      font-size: 0.75rem;
      color: #ccc;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <h1>👻 Ghostbusters Virginia</h1>
  <p class="subtitle">Make-A-Wish TeamRaiser — Event #7464 · Team #58435</p>

  <button id="fetch-btn" onclick="onFetchClick()">Fetch Fundraising Data</button>
  <p id="status"></p>

  <div class="stats">
    <div class="stat-box">
      <div class="stat-label">Goal</div>
      <div class="stat-value" id="goal">—</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Amount Raised</div>
      <div class="stat-value" id="raised">—</div>
    </div>
  </div>

  <div class="progress-section">
    <div class="progress-track">
      <div class="progress-fill" id="progress-bar"></div>
    </div>
    <div class="progress-label" id="progress-pct"></div>
  </div>

  <details>
    <summary>Raw API response</summary>
    <pre id="raw-response">(none yet)</pre>
  </details>

  <script src="fetch.js"></script>
</body>
</html>
